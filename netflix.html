<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            background-color: #000;
            margin: auto;
        }

        div {
            width: 50px;
            height: 250px;
            background-color: #b20710;
            position: relative;
        }

        div::before {
            content: "";
            width: 50px;
            height: 250px;
            background-color: #b20710;
            position: absolute;
            left: 90px;
        }

        div::after {
            content: "";
            width: 175px;
            height: 20px;
            background-color: #000;
            position: absolute;
            bottom: -10px;
            left: -15px;
            border-radius: 50%;
        }

        span {
            width: 50px;
            height: 250px;
            background-color: #e50914;
            position: absolute;
            left: 46px;
            transform: skew(20deg);
            box-shadow: 0 0 10px -4px #000;
        }
    </style>
</head>

<body>
    <div><span></span></div>
</body>

</html>
